[flake8]
max-line-length = 100
exclude = .git,__pycache__,venv,.venv,build,dist

[mypy]
ignore_missing_imports = True
disable_error_code = import-untyped

[coverage:run]
omit = 
    tests/transform_coverage.py
    tests/conftest.py
    temp_*.py
    */__pycache__/*

[coverage:report]
fail_under = 90
exclude_lines = 
    pragma: no cover
    if __name__ == .__main__.:
